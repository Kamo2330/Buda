<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hamba - Travel Booking Platform{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'booking/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header class="header" role="banner">
        <div class="container">
            <div class="header-content">
                <a href="{% url 'booking:home' %}" class="logo" aria-label="Hamba home">
                    <span class="logo-bag" aria-hidden="true">🧳</span>
                    <span>Hamba</span>
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="main-content" role="main">
        {% if messages %}
            <div class="container">
                <div class="messages" role="status" aria-live="polite">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <p>&copy; 2025 Hamba. All rights reserved.</p>
        </div>
    </footer>

    <script src="{% static 'booking/js/main.js' %}"></script>
    <script src="{% static 'booking/js/smart-datepicker.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
