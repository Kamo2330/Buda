<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hamba - Travel Booking Platform{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'booking/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{% url 'booking:home' %}" class="logo">
                    <h1><span class="logo-bag">🧳</span>Hamba</h1>
                </a>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% if messages %}
            <div class="container">
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Hamba. All rights reserved.</p>
        </div>
    </footer>

    <script src="{% static 'booking/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
