{% extends 'base.html' %}

{% block title %}Message host · Qasha{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 560px;">
    <nav class="mb-3">
        <a href="{% url 'rentals:property_detail' property.pk %}" class="text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to place</a>
    </nav>
    <h1 class="h4 text-primary mb-2">Message the owner</h1>
    <p class="text-muted mb-4">About: <strong>{{ property.title }}</strong></p>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="{{ form.message.id_for_label }}">Message</label>
                    {{ form.message }}
                    {{ form.message.errors }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Send message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
